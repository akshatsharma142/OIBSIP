<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Calculator -->
        <div class="calculator">

            <!-- Display -->
            <div class="display">

                <div id="expression" class="expression">
                    0
                </div>

                <div id="result" class="result">
                    0
                </div>

            </div>

            <!-- Buttons -->
            <div class="buttons">

                <!-- Row 1 -->
                <button class="btn function" data-value="C" aria-label="Clear">
                    C
                </button>

                <button class="btn function" data-value="backspace" aria-label="Backspace">
                    ⌫
                </button>

                <button class="btn operator" data-value="%">
                    %
                </button>

                <button class="btn operator" data-value="/">
                    ÷
                </button>

                <!-- Row 2 -->
                <button class="btn number" data-value="7">
                    7
                </button>

                <button class="btn number" data-value="8">
                    8
                </button>

                <button class="btn number" data-value="9">
                    9
                </button>

                <button class="btn operator" data-value="*">
                    ×
                </button>

                <!-- Row 3 -->
                <button class="btn number" data-value="4">
                    4
                </button>

                <button class="btn number" data-value="5">
                    5
                </button>

                <button class="btn number" data-value="6">
                    6
                </button>

                <button class="btn operator" data-value="-">
                    −
                </button>

                <!-- Row 4 -->
                <button class="btn number" data-value="1">
                    1
                </button>

                <button class="btn number" data-value="2">
                    2
                </button>

                <button class="btn number" data-value="3">
                    3
                </button>

                <button class="btn operator" data-value="+">
                    +
                </button>

                <!-- Row 5 -->
                <button class="btn zero number" data-value="0">
                    0
                </button>

                <button class="btn number" data-value=".">
                    .
                </button>

                <button class="btn equal" data-value="=">
                    =
                </button>

            </div>

        </div>

        <!-- History Panel -->
        <div class="history">

            <h2>History</h2>

            <ul id="historyList">

                <li class="empty">
                    No calculations yet
                </li>

            </ul>

            <button id="clearHistory" class="history-btn">
                Clear History
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
